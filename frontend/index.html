<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaxiPulse | NYC Yellow Cab Analytics</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>TaxiPulse</h1>
    <p class="sub">The heartbeat of NYC, Yellow Cab demand, fares, and flows</p>
  </header>

  <section class="controls">
    <label>From <input type="datetime-local" id="start_date" /></label>
    <label>To <input type="datetime-local" id="end_date" /></label>
    <div class="presets" id="presets"></div>
    <label>Metric
      <select id="metric">
        <option value="trips">Trip volume</option>
        <option value="average_fare">Average fare</option>
        <option value="average_tip_percent">Average tip %</option>
      </select>
    </label>
    <label class="toggle">
      <input type="checkbox" id="show_flows" />
      Show top flows
    </label>
    <button id="apply">Apply</button>
  </section>

  <main class="grid">
    <div class="card map-card">
      <div class="card-header">
        <h2>Pickup choropleth</h2>
        <div class="card-actions">
          <a class="download" id="download_zones" href="#">Zones CSV</a>
          <a class="download" id="download_flows" href="#">Flows CSV</a>
        </div>
      </div>
      <div id="map"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Demand by hour</h2>
        <a class="download" id="download_hourly" href="#">Download CSV</a>
      </div>
      <canvas id="hourlyChart"></canvas>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Top pickup zones</h2>
        <a class="download" id="download_top_zones" href="#">Download CSV</a>
      </div>
      <canvas id="zoneChart"></canvas>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
